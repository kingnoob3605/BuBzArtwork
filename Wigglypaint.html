<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WigglyPaint ✦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-chrome: #1a1128;
      --bg-chrome2: #231830;
      --accent:    #ef745c;
      --accent2:   #9b72cf;
      --text:      #f0e4ff;
      --text-dim:  rgba(240,228,255,0.5);
      --sep:       rgba(255,255,255,0.1);
      --btn-idle:  rgba(255,255,255,0.08);
      --btn-hover: rgba(255,255,255,0.15);
      --radius:    10px;
      --toolbar-h: 54px;
      --bottom-h:  52px;
    }

    html, body {
      height: 100%;
      background: #0e0918;
      font-family: 'Caveat', cursive;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ═══════════════════════════════════
       TOP TOOLBAR
    ═══════════════════════════════════ */
    #toolbar {
      height: var(--toolbar-h);
      background: var(--bg-chrome);
      border-bottom: 1px solid var(--sep);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      flex-shrink: 0;
      position: relative;
      z-index: 30;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .sep {
      width: 1px;
      height: 26px;
      background: var(--sep);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* Generic button */
    .wp-btn {
      min-width: 40px;
      height: 40px;
      padding: 0 12px;
      border: none;
      border-radius: var(--radius);
      background: var(--btn-idle);
      color: var(--text);
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, transform 0.08s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .wp-btn:hover   { background: var(--btn-hover); }
    .wp-btn:active  { transform: scale(0.92); }
    .wp-btn.active  { background: var(--accent); color: #fff; }
    .wp-btn.danger  { color: #ff8080; }
    .wp-btn.danger:hover { background: rgba(255,80,80,0.15); }
    .wp-btn:disabled { opacity: 0.35; pointer-events: none; }

    /* Icon-only square */
    .wp-btn.icon { width: 40px; min-width: 40px; padding: 0; font-size: 1.1rem; }

    /* ── Color swatches ── */
    .swatch-wrap {
      position: relative;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    .swatch {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.25);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .swatch:hover  { border-color: rgba(255,255,255,0.55); }
    .swatch:active { transform: scale(0.9); }
    .swatch-wrap input[type=color] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
      border: none; padding: 0;
    }
    .swatch-label {
      font-size: 0.6rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 2px;
      line-height: 1;
      pointer-events: none;
    }
    .swatch-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    /* ── Size button + popup ── */
    #size-btn {
      flex-direction: column;
      gap: 2px;
      padding: 4px 8px;
    }
    #size-dot {
      background: var(--text);
      border-radius: 50%;
      flex-shrink: 0;
      transition: width 0.15s, height 0.15s;
    }
    #size-val {
      font-size: 0.72rem;
      color: var(--text-dim);
      line-height: 1;
    }

    /* ═══════════════════════════════════
       POPUPS (size + settings)
    ═══════════════════════════════════ */
    .popup {
      position: absolute;
      top: calc(var(--toolbar-h) + 6px);
      left: 8px;
      background: var(--bg-chrome2);
      border: 1px solid var(--sep);
      border-radius: 14px;
      padding: 14px 16px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 220px;
      animation: popupIn 0.18s cubic-bezier(0.34,1.4,0.64,1);
    }
    .popup.hidden { display: none; }
    @keyframes popupIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .popup-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .popup-label {
      font-size: 0.9rem;
      color: var(--text-dim);
      min-width: 48px;
    }
    .popup input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      height: 6px;
      cursor: pointer;
    }
    .popup-val {
      font-size: 0.85rem;
      color: var(--text);
      min-width: 24px;
      text-align: right;
    }

    /* Boil presets */
    .boil-presets {
      display: flex;
      gap: 6px;
    }
    .boil-btn {
      flex: 1;
      height: 34px;
      border: 1.5px solid var(--sep);
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Caveat', cursive;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
    }
    .boil-btn:hover  { border-color: var(--accent); color: var(--text); }
    .boil-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Canvas size chips */
    .size-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .size-chip {
      padding: 4px 10px;
      border: 1.5px solid var(--sep);
      border-radius: 20px;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Caveat', cursive;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.12s;
    }
    .size-chip:hover  { border-color: var(--accent); color: var(--text); }
    .size-chip.active { background: rgba(239,116,92,0.2); border-color: var(--accent); color: var(--text); }

    /* ═══════════════════════════════════
       CANVAS AREA
    ═══════════════════════════════════ */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(155,114,207,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(239,116,92,0.06) 0%, transparent 60%),
        #0e0918;
    }

    #wp-canvas {
      display: block;
      touch-action: none;
      cursor: none;
      max-width: 100%;
      max-height: 100%;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 4px 24px rgba(0,0,0,0.5),
        0 16px 48px rgba(0,0,0,0.35);
    }
    #wp-canvas.tool-fill { cursor: crosshair; }

    /* Brush cursor ring */
    #brush-cursor {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 20;
      box-sizing: border-box;
      transition: width 0.08s, height 0.08s;
    }

    /* Status toast on canvas */
    #toast {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,17,40,0.9);
      border: 1px solid var(--sep);
      color: var(--text);
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      padding: 7px 18px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 50;
      backdrop-filter: blur(8px);
    }
    #toast.show { opacity: 1; }

    /* ═══════════════════════════════════
       PROGRESS BAR
    ═══════════════════════════════════ */
    #progress-wrap {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      z-index: 60;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.12s;
    }

    /* ═══════════════════════════════════
       BOTTOM ACTION BAR
    ═══════════════════════════════════ */
    #actions {
      height: var(--bottom-h);
      background: var(--bg-chrome);
      border-top: 1px solid var(--sep);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 6px;
      flex-shrink: 0;
      position: relative;
      z-index: 30;
    }

    #actions .spacer { flex: 1; }

    .wp-btn.gif-btn {
      background: rgba(155,114,207,0.25);
      color: #c8a8ff;
      border: 1px solid rgba(155,114,207,0.4);
    }
    .wp-btn.gif-btn:hover { background: rgba(155,114,207,0.4); }

    .wp-btn.primary {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .wp-btn.primary:hover { background: #d4634e; }

    /* Overlay to close popups */
    #popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 25;
    }
    #popup-overlay.show { display: block; }
  </style>
</head>
<body>

<!-- ── Popup close overlay ── -->
<div id="popup-overlay" onclick="closeAllPopups()"></div>

<!-- ═══════════════════ TOP TOOLBAR ═══════════════════ -->
<div id="toolbar">

  <!-- Color swatch -->
  <div class="swatch-group">
    <div class="swatch-wrap" title="Draw color">
      <div class="swatch" id="color-swatch" style="background:#2d2d2d"></div>
      <input type="color" id="wp-color" value="#2d2d2d">
    </div>
    <div class="swatch-label">color</div>
  </div>

  <!-- BG color swatch -->
  <div class="swatch-group">
    <div class="swatch-wrap" title="Canvas background">
      <div class="swatch" id="bg-swatch" style="background:#fdf6f0"></div>
      <input type="color" id="wp-bg" value="#fdf6f0">
    </div>
    <div class="swatch-label">bg</div>
  </div>

  <!-- Size button -->
  <button class="wp-btn icon" id="size-btn" onclick="togglePopup('size')" title="Brush size">
    <div id="size-dot" style="width:8px;height:8px"></div>
    <span id="size-val">4</span>
  </button>

  <div class="sep"></div>

  <!-- Tool group -->
  <div class="tool-group">
    <button class="wp-btn icon active" id="pen-btn"    onclick="setTool('brush')"  title="Pen">✏️</button>
    <button class="wp-btn icon"        id="eraser-btn" onclick="setTool('eraser')" title="Eraser">🧽</button>
    <button class="wp-btn icon"        id="fill-btn"   onclick="setTool('fill')"   title="Fill">🪣</button>
  </div>

  <div class="sep"></div>

  <!-- History -->
  <div class="tool-group">
    <button class="wp-btn icon" onclick="wpUndo()"  title="Undo">↩</button>
    <button class="wp-btn icon danger" onclick="wpClear()" title="Clear">✕</button>
  </div>

  <!-- Settings gear (right-aligned) -->
  <div style="flex:1"></div>
  <button class="wp-btn icon" id="settings-btn" onclick="togglePopup('settings')" title="Settings">⚙️</button>

</div>

<!-- ── Size popup ── -->
<div class="popup hidden" id="popup-size">
  <div class="popup-row">
    <span class="popup-label">Size</span>
    <input type="range" id="wp-size" min="1" max="40" value="4">
    <span class="popup-val" id="size-label">4</span>
  </div>
</div>

<!-- ── Settings popup ── -->
<div class="popup hidden" id="popup-settings" style="left:auto;right:8px">
  <div class="popup-row">
    <span class="popup-label">Wiggle</span>
    <div class="boil-presets">
      <button class="boil-btn" id="boil-calm"   onclick="setBoil(0.6, this)">Calm</button>
      <button class="boil-btn active" id="boil-mid" onclick="setBoil(1.8, this)">Wiggly</button>
      <button class="boil-btn" id="boil-chaos"  onclick="setBoil(3.8, this)">Chaos</button>
    </div>
  </div>
  <input type="hidden" id="wp-boil" value="1.8">
  <div class="popup-row">
    <span class="popup-label">Canvas</span>
    <div class="size-chips">
      <button class="size-chip active" onclick="applyCanvasSize('auto', this)">Auto</button>
      <button class="size-chip" onclick="applyCanvasSize('800x800', this)">800²</button>
      <button class="size-chip" onclick="applyCanvasSize('1280x720', this)">16:9</button>
      <button class="size-chip" onclick="applyCanvasSize('720x1280', this)">9:16</button>
      <button class="size-chip" onclick="applyCanvasSize('600x800', this)">4:3</button>
    </div>
  </div>
</div>

<!-- ═══════════════════ CANVAS ═══════════════════ -->
<div id="canvas-wrap">
  <canvas id="wp-canvas"></canvas>
  <div id="brush-cursor"></div>
  <div id="toast"></div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
</div>

<!-- ═══════════════════ BOTTOM BAR ═══════════════════ -->
<div id="actions">
  <button class="wp-btn gif-btn" id="btn-gif" onclick="previewGif()">🌀 Preview</button>
  <div class="spacer"></div>
  <button class="wp-btn icon" onclick="toggleFullscreen()" id="fs-btn" title="Fullscreen">⛶</button>
  <button class="wp-btn primary" onclick="submitToGallery()">📤 Submit</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script>
// =============================================
// WIGGLYPAINT — Line Boil implementation
// Frame A (clean) + Frame B (boil offsets)
// 110ms timer alternates → Ed Edd n Eddy boil
// =============================================

const canvas      = document.getElementById('wp-canvas');
const ctx         = canvas.getContext('2d');
const wrap        = document.getElementById('canvas-wrap');
const brushCursor = document.getElementById('brush-cursor');
const colorEl     = document.getElementById('wp-color');
const sizeEl      = document.getElementById('wp-size');
const boilEl      = document.getElementById('wp-boil');
const bgEl        = document.getElementById('wp-bg');

// ---- State ----
let strokes        = [];  // [{type:'stroke',...} | {type:'fill',...}]
let curStroke      = null;
let isDrawing      = false;
let showB          = false;
let eraserOn       = false;
let currentTool    = 'brush';
let boilTimer      = null;
let lastGifUrl     = null;
let isRecording    = false;
let canvasSizeMode = 'auto';
let lastCursorE    = null;
let toastTimer     = null;

// ---- Accessors ----
function getColor() { return colorEl.value; }
function getSize()  { return parseInt(sizeEl.value, 10) || 4; }
function getBoil()  { return parseFloat(boilEl.value) || 1.8; }
function getBg()    { return bgEl.value; }

// ---- Swatch sync ----
colorEl.addEventListener('input', () => {
    document.getElementById('color-swatch').style.background = colorEl.value;
    if (lastCursorE) updateBrushCursor(lastCursorE);
});
bgEl.addEventListener('input', () => {
    document.getElementById('bg-swatch').style.background = bgEl.value;
    if (lastCursorE) updateBrushCursor(lastCursorE);
    redraw(showB);
});
sizeEl.addEventListener('input', () => {
    const v = sizeEl.value;
    document.getElementById('size-label').textContent = v;
    document.getElementById('size-val').textContent   = v;
    // Scale dot: range 1-40 → 5-22px display
    const px = Math.round(5 + (v - 1) / 39 * 17);
    const dot = document.getElementById('size-dot');
    dot.style.width  = px + 'px';
    dot.style.height = px + 'px';
    if (lastCursorE) updateBrushCursor(lastCursorE);
});

// ---- Boil presets ----
function setBoil(val, btn) {
    boilEl.value = val;
    document.querySelectorAll('.boil-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
}

// ---- Popup system ----
function togglePopup(name) {
    const sizeP     = document.getElementById('popup-size');
    const settingsP = document.getElementById('popup-settings');
    const overlay   = document.getElementById('popup-overlay');
    const target    = name === 'size' ? sizeP : settingsP;
    const other     = name === 'size' ? settingsP : sizeP;

    other.classList.add('hidden');
    const isOpen = !target.classList.contains('hidden');
    target.classList.toggle('hidden', isOpen);
    overlay.classList.toggle('show', !isOpen);
}

function closeAllPopups() {
    document.getElementById('popup-size').classList.add('hidden');
    document.getElementById('popup-settings').classList.add('hidden');
    document.getElementById('popup-overlay').classList.remove('show');
}

// ---- Tool selection ----
function setTool(tool) {
    currentTool = tool;
    eraserOn    = (tool === 'eraser');
    document.getElementById('pen-btn').classList.toggle('active',    tool === 'brush');
    document.getElementById('eraser-btn').classList.toggle('active', tool === 'eraser');
    document.getElementById('fill-btn').classList.toggle('active',   tool === 'fill');
    if (tool === 'fill') {
        canvas.style.cursor = 'crosshair';
        canvas.classList.add('tool-fill');
        brushCursor.style.display = 'none';
    } else {
        canvas.style.cursor = 'none';
        canvas.classList.remove('tool-fill');
        if (lastCursorE) updateBrushCursor(lastCursorE);
    }
}

// ---- Brush cursor ----
function updateBrushCursor(e) {
    lastCursorE = e;
    if (currentTool === 'fill') { brushCursor.style.display = 'none'; return; }

    const wrapRect = wrap.getBoundingClientRect();
    const canvRect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;

    brushCursor.style.left = (src.clientX - wrapRect.left) + 'px';
    brushCursor.style.top  = (src.clientY - wrapRect.top)  + 'px';

    const scale  = canvRect.width / canvas.width;
    const sizePx = Math.max(4, getSize() * scale);
    brushCursor.style.width  = sizePx + 'px';
    brushCursor.style.height = sizePx + 'px';

    if (eraserOn) {
        brushCursor.style.background = getBg();
        brushCursor.style.border     = '2px solid rgba(255,255,255,0.5)';
    } else {
        brushCursor.style.background = colorEl.value + '33';
        brushCursor.style.border     = '2px solid ' + colorEl.value;
    }
    brushCursor.style.display = 'block';
}

// ---- Canvas size ----
function applyCanvasSize(val, chipEl) {
    if (strokes.length > 0 && !confirm('Changing size will clear your drawing. Continue?')) return;

    // Update chip active state
    if (chipEl) {
        document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active'));
        chipEl.classList.add('active');
    }

    canvasSizeMode = val;
    lastGifUrl = null;
    strokes = [];
    showToast('Canvas cleared ✦');

    if (val === 'auto') {
        canvas.style.width  = '';
        canvas.style.height = '';
        resizeCanvas();
    } else {
        const [w, h] = val.split('x').map(Number);
        canvas.width  = w;
        canvas.height = h;
        canvas.style.width  = w + 'px';
        canvas.style.height = h + 'px';
        redraw();
    }
    closeAllPopups();
}

// ---- Resize ----
function resizeCanvas() {
    if (canvasSizeMode !== 'auto') return;
    const rect = wrap.getBoundingClientRect();
    canvas.width  = Math.max(1, Math.floor(rect.width));
    canvas.height = Math.max(1, Math.floor(rect.height));
    canvas.style.width  = '';
    canvas.style.height = '';
    redraw();
}

// ---- Pointer coords — accounts for CSS scaling ----
function getPos(e) {
    const rect   = canvas.getBoundingClientRect();
    const src    = e.touches ? e.touches[0] : e;
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
        x: (src.clientX - rect.left) * scaleX,
        y: (src.clientY - rect.top)  * scaleY
    };
}

// ---- Draw events ----
function startDraw(e) {
    if (isRecording) return;
    e.preventDefault();
    closeAllPopups();
    updateBrushCursor(e);
    const pos = getPos(e);

    if (currentTool === 'fill') {
        doFill(pos.x, pos.y);
        return;
    }

    isDrawing = true;
    curStroke = {
        points: [pos],
        color:  eraserOn ? null : getColor(),
        size:   getSize(),
        eraser: eraserOn
    };
}

function moveDraw(e) {
    e.preventDefault();
    updateBrushCursor(e);
    if (!isDrawing || isRecording) return;
    const pos  = getPos(e);
    const last = curStroke.points[curStroke.points.length - 1];
    if ((pos.x - last.x) ** 2 + (pos.y - last.y) ** 2 > 2) {
        curStroke.points.push(pos);
    }
}

function stopDraw() {
    if (!isDrawing) return;
    isDrawing = false;
    if (!curStroke || curStroke.points.length === 0) { curStroke = null; return; }

    const boil   = getBoil();
    const pointsB = curStroke.points.map(p => ({
        x: p.x + (Math.random() - 0.5) * boil * 2,
        y: p.y + (Math.random() - 0.5) * boil * 2
    }));

    strokes.push({
        type:    'stroke',
        pointsA: curStroke.points,
        pointsB,
        color:   curStroke.color,
        size:    curStroke.size,
        eraser:  curStroke.eraser
    });
    curStroke  = null;
    lastGifUrl = null;
}

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mouseup',    stopDraw);
canvas.addEventListener('mouseleave', e => { stopDraw(); brushCursor.style.display = 'none'; });
canvas.addEventListener('mouseenter', e => { if (currentTool !== 'fill') updateBrushCursor(e); });
canvas.addEventListener('mousemove',  moveDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove',  moveDraw,  { passive: false });
canvas.addEventListener('touchend',   stopDraw);
canvas.addEventListener('touchcancel', stopDraw); // fix: cancel also ends stroke

// ---- Fill tool ----
function hexToRgb(hex) {
    return [
        parseInt(hex.slice(1, 3), 16),
        parseInt(hex.slice(3, 5), 16),
        parseInt(hex.slice(5, 7), 16)
    ];
}

function doFill(x, y) {
    strokes.push({ type: 'fill', x, y, rgb: hexToRgb(colorEl.value) });
    lastGifUrl = null;
    redraw(showB);
}

function floodFill(imageData, sx, sy, fillRGB) {
    const { data, width: w, height: h } = imageData;
    sx = Math.round(sx); sy = Math.round(sy);
    if (sx < 0 || sx >= w || sy < 0 || sy >= h) return;

    const i0  = (sy * w + sx) * 4;
    const tR  = data[i0], tG = data[i0+1], tB = data[i0+2], tA = data[i0+3];
    const [fR, fG, fB] = fillRGB;
    if (tR === fR && tG === fG && tB === fB && tA === 255) return;

    const TOL   = 28;
    const match = i =>
        Math.abs(data[i]   - tR) <= TOL &&
        Math.abs(data[i+1] - tG) <= TOL &&
        Math.abs(data[i+2] - tB) <= TOL;

    const visited = new Uint8Array(w * h);
    const stack   = [sy * w + sx];
    visited[sy * w + sx] = 1;

    while (stack.length) {
        const idx = stack.pop();
        const y   = (idx / w) | 0;
        const x   = idx % w;
        const pi  = idx * 4;
        data[pi] = fR; data[pi+1] = fG; data[pi+2] = fB; data[pi+3] = 255;
        const nb = [
            x > 0     ? idx-1 : -1,
            x < w-1   ? idx+1 : -1,
            y > 0     ? idx-w : -1,
            y < h-1   ? idx+w : -1
        ];
        for (const n of nb) {
            if (n >= 0 && !visited[n] && match(n*4)) { visited[n] = 1; stack.push(n); }
        }
    }
}

// ---- Clear / Undo ----
function wpClear() {
    strokes = [];
    curStroke = null;
    lastGifUrl = null;
    redraw(showB); // keep current boil frame
    showToast('Canvas cleared ✦');
}

function wpUndo() {
    if (!strokes.length) return;
    strokes.pop();
    lastGifUrl = null;
    redraw(showB);
    showToast('Undone');
}

// ---- Render ----
function drawStroke(pts, color, size) {
    if (!pts || pts.length === 0) return;
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth   = size;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    if (pts.length === 1) {
        ctx.arc(pts[0].x, pts[0].y, size/2, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        return;
    }
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
}

function redraw(useB) {
    ctx.fillStyle = getBg();
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const s of strokes) {
        if (s.type === 'fill') {
            const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
            floodFill(id, s.x, s.y, s.rgb);
            ctx.putImageData(id, 0, 0);
        } else {
            const col = s.eraser ? getBg() : s.color;
            drawStroke(useB ? s.pointsB : s.pointsA, col, s.size);
        }
    }

    if (curStroke && curStroke.points.length > 0) {
        const col = curStroke.eraser ? getBg() : curStroke.color;
        drawStroke(curStroke.points, col, curStroke.size);
    }
}

// ---- Boil timer ----
function startBoilTimer() {
    boilTimer = setInterval(() => {
        if (isRecording) return;
        showB = !showB;
        redraw(showB);
    }, 110);
}

// ---- Status toast ----
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ---- GIF worker ----
let _gifWorkerUrl = null;
async function getWorkerUrl() {
    if (_gifWorkerUrl) return _gifWorkerUrl;
    try {
        const code = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.text());
        _gifWorkerUrl = URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
    } catch {
        _gifWorkerUrl = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js';
    }
    return _gifWorkerUrl;
}

// ---- GIF encode ----
async function encodeGif(onDone) {
    if (isRecording) return;
    isRecording = true;
    lastGifUrl  = null;
    clearInterval(boilTimer);

    const btn = document.getElementById('btn-gif');
    btn.disabled = true;
    showToast('Encoding animation…');

    const workerUrl = await getWorkerUrl();
    const DELAY = 110;
    const gif = new GIF({
        workers: 2, quality: 6,
        width: canvas.width, height: canvas.height,
        workerScript: workerUrl
    });

    const pw = document.getElementById('progress-wrap');
    const pb = document.getElementById('progress-bar');
    pw.style.display = 'block';

    const PAIRS = 8;
    for (let i = 0; i < PAIRS; i++) {
        redraw(false); gif.addFrame(canvas, { copy: true, delay: DELAY });
        redraw(true);  gif.addFrame(canvas, { copy: true, delay: DELAY });
        pb.style.width = Math.round((i / PAIRS) * 60) + '%';
        await new Promise(r => setTimeout(r, 4));
    }

    pb.style.width = '70%';
    gif.on('progress', p => { pb.style.width = (70 + Math.round(p * 28)) + '%'; });

    gif.on('finished', blob => {
        pb.style.width = '100%';
        setTimeout(() => { pw.style.display = 'none'; pb.style.width = '0%'; }, 500);
        const reader = new FileReader();
        reader.onload = ev => {
            lastGifUrl   = ev.target.result;
            btn.disabled = false;
            isRecording  = false;
            startBoilTimer();
            if (onDone) onDone(lastGifUrl);
        };
        reader.readAsDataURL(blob);
    });

    gif.on('error', () => {
        showToast('Encoding failed, try again 😿');
        pw.style.display = 'none';
        btn.disabled = false;
        isRecording  = false;
        startBoilTimer();
    });

    gif.render();
}

function previewGif() {
    if (!strokes.length) { showToast('Draw something first!'); return; }
    encodeGif(() => showToast('Ready! Hit Submit to send ✨'));
}

function submitToGallery() {
    if (!strokes.length) { showToast('Draw something first!'); return; }
    if (lastGifUrl) { doSubmit(); return; }
    showToast('Encoding…');
    encodeGif(() => doSubmit());
}

function doSubmit() {
    redraw(false);
    window.parent.postMessage({ type: 'wiggly-submit', dataUrl: lastGifUrl }, window.location.origin);
    showToast('Submitted! ✨');
}

// ---- Message from parent ----
window.addEventListener('message', e => {
    if (e.origin !== window.location.origin) return;
    if (e.data?.type === 'trigger-submit') submitToGallery();
});

// ---- Fullscreen ----
function toggleFullscreen() {
    const btn = document.getElementById('fs-btn');
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
        btn.textContent = '✕'; btn.title = 'Exit fullscreen';
    } else {
        document.exitFullscreen();
        btn.textContent = '⛶'; btn.title = 'Fullscreen';
    }
}
document.addEventListener('fullscreenchange', () => {
    const btn = document.getElementById('fs-btn');
    if (btn) btn.textContent = document.fullscreenElement ? '✕' : '⛶';
    resizeCanvas();
});

// ---- Init ----
resizeCanvas();
startBoilTimer();
window.addEventListener('resize', resizeCanvas);
// Init swatch + dot state
document.getElementById('color-swatch').style.background = colorEl.value;
document.getElementById('bg-swatch').style.background    = bgEl.value;
(function initSizeDot() {
    const px = Math.round(5 + (sizeEl.value - 1) / 39 * 17);
    const dot = document.getElementById('size-dot');
    dot.style.width = px + 'px'; dot.style.height = px + 'px';
    document.getElementById('size-val').textContent = sizeEl.value;
})();
</script>
