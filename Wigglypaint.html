<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WigglyPaint ✦</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fdf6f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ---- Toolbar ---- */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      background: #fff4ec;
      border-bottom: 2px dashed #e8c9b0;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .ctrl {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      color: #7a5c44;
      white-space: nowrap;
    }
    .ctrl input[type=color] {
      width: 30px; height: 26px;
      border: 1.5px solid #d4b09a;
      padding: 1px; border-radius: 5px;
      cursor: pointer; background: none;
    }
    .ctrl input[type=range] {
      width: 64px;
      accent-color: #e88c72;
      cursor: pointer;
    }
    .ctrl span { font-size: 0.72rem; color: #b09080; min-width: 20px; text-align: center; }
    .sep { width: 1px; height: 18px; background: #e0c8b8; flex-shrink: 0; }

    .wp-btn {
      padding: 5px 11px;
      border: 1.5px solid #d4a088;
      background: #fff;
      color: #7a5c44;
      border-radius: 20px;
      font-size: 0.76rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      line-height: 1.4;
    }
    .wp-btn:hover { background: #ffe8dd; border-color: #e88c72; }
    .wp-btn.danger { border-color: #e07070; color: #c05050; }
    .wp-btn.danger:hover { background: #ffe0e0; }
    .wp-btn:disabled { opacity: 0.45; cursor: default; pointer-events: none; }
    .wp-btn.active { background: #ffe8dd; border-color: #e88c72; font-weight: 600; }

    /* ---- Canvas ---- */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    #wp-canvas {
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    /* ---- Action bar ---- */
    #actions {
      display: flex;
      gap: 8px;
      padding: 7px 10px;
      background: #fff4ec;
      border-top: 2px dashed #e8c9b0;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .action-left  { display: flex; gap: 6px; align-items: center; min-width: 0; }
    .action-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    .wp-btn.gif-btn {
      background: #9b72cf;
      border-color: #9b72cf;
      color: #fff;
      font-weight: 600;
    }
    .wp-btn.gif-btn:hover { background: #8560bb; border-color: #8560bb; }

    .wp-btn.primary {
      background: #e88c72;
      border-color: #e88c72;
      color: #fff;
      font-weight: 600;
    }
    .wp-btn.primary:hover { background: #d4785e; border-color: #d4785e; }

    .wp-btn.fs-btn { padding: 5px 8px; font-size: 0.9rem; }

    #status {
      font-size: 0.72rem;
      color: #9b72cf;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    /* ---- Progress ---- */
    #progress-wrap {
      display: none;
      position: absolute;
      bottom: 50px; left: 0; right: 0;
      height: 4px;
      background: #e8d4f0;
      z-index: 10;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #9b72cf, #e88c72);
      transition: width 0.12s;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <!-- Color -->
  <label class="ctrl" title="Color">
    🎨 <input type="color" id="wp-color" value="#2d2d2d">
  </label>
  <div class="sep"></div>
  <!-- Size -->
  <label class="ctrl" title="Brush size">
    📏 <input type="range" id="wp-size" min="1" max="28" value="4">
    <span id="size-label">4</span>
  </label>
  <div class="sep"></div>
  <!-- Boil strength -->
  <label class="ctrl" title="Boil intensity — how much the lines wiggle">
    🌀 <input type="range" id="wp-boil" min="0.2" max="4" step="0.1" value="1.6">
    <span id="boil-label">1.6</span>
  </label>
  <div class="sep"></div>
  <!-- BG -->
  <label class="ctrl" title="Canvas background">
    🖼 <input type="color" id="wp-bg" value="#fdf6f0">
  </label>
  <div class="sep"></div>
  <button class="wp-btn" id="eraser-btn" onclick="toggleEraser(this)">🧹 Eraser</button>
  <button class="wp-btn" onclick="wpUndo()">↩ Undo</button>
  <button class="wp-btn danger" onclick="wpClear()">✕ Clear</button>
</div>

<div id="canvas-wrap">
  <canvas id="wp-canvas"></canvas>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
</div>

<div id="actions">
  <div class="action-left">
    <button class="wp-btn gif-btn" id="btn-gif" onclick="previewGif()">🌀 Preview</button>
    <span id="status"></span>
  </div>
  <div class="action-right">
    <button class="wp-btn fs-btn" onclick="toggleFullscreen()" id="fs-btn" title="Fullscreen">⛶</button>
    <button class="wp-btn primary" onclick="submitToGallery()">📤 Submit</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script>
// =============================================
// WIGGLYPAINT — Line Boil implementation
// Each stroke bakes Frame A (clean) + Frame B (tiny random offsets)
// setInterval at 110ms alternates between them → Ed Edd n Eddy boil
// =============================================

const canvas = document.getElementById('wp-canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

// ---- State ----
let strokes     = []; // [{pointsA, pointsB, color, size, eraser}]
let curStroke   = null;
let isDrawing   = false;
let showB       = false;
let eraserOn    = false;
let boilTimer   = null;
let lastGifUrl  = null;
let isRecording = false;

// ---- Controls ----
const colorEl = document.getElementById('wp-color');
const sizeEl  = document.getElementById('wp-size');
const boilEl  = document.getElementById('wp-boil');
const bgEl    = document.getElementById('wp-bg');

sizeEl.addEventListener('input', () => document.getElementById('size-label').textContent = sizeEl.value);
boilEl.addEventListener('input', () => document.getElementById('boil-label').textContent = boilEl.value);

function getColor()  { return eraserOn ? getBg() : colorEl.value; }
function getSize()   { return parseInt(sizeEl.value, 10) || 4; }
function getBoil()   { return parseFloat(boilEl.value) || 1.6; }
function getBg()     { return bgEl.value; }

function toggleEraser(btn) {
    eraserOn = !eraserOn;
    btn.classList.toggle('active', eraserOn);
    canvas.style.cursor = eraserOn ? 'cell' : 'crosshair';
}

// ---- Resize ----
function resizeCanvas() {
    const rect = wrap.getBoundingClientRect();
    canvas.width  = Math.max(1, Math.floor(rect.width));
    canvas.height = Math.max(1, Math.floor(rect.height));
    redraw();
}

// ---- Pointer ----
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

// ---- Draw events ----
function startDraw(e) {
    if (isRecording) return;
    e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    curStroke = {
        points: [pos],
        color: getColor(),
        size: getSize(),
        eraser: eraserOn
    };
}

function moveDraw(e) {
    if (!isDrawing || isRecording) return;
    e.preventDefault();
    const pos  = getPos(e);
    const last = curStroke.points[curStroke.points.length - 1];
    // Only add if moved enough (keeps point count sane)
    if ((pos.x - last.x) ** 2 + (pos.y - last.y) ** 2 > 2) {
        curStroke.points.push(pos);
    }
}

function stopDraw() {
    if (!isDrawing) return;
    isDrawing = false;
    if (!curStroke || curStroke.points.length === 0) { curStroke = null; return; }

    const boil = getBoil();
    // Bake Frame B: each point gets a tiny fixed random offset
    const pointsB = curStroke.points.map(p => ({
        x: p.x + (Math.random() - 0.5) * boil * 2,
        y: p.y + (Math.random() - 0.5) * boil * 2
    }));

    strokes.push({
        pointsA: curStroke.points,
        pointsB,
        color: curStroke.color,
        size: curStroke.size,
        eraser: curStroke.eraser
    });
    curStroke = null;
    lastGifUrl = null; // invalidate cached GIF
    setStatus('');
}

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  moveDraw);
canvas.addEventListener('mouseup',    stopDraw);
canvas.addEventListener('mouseleave', stopDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove',  moveDraw,  { passive: false });
canvas.addEventListener('touchend',   stopDraw);

// ---- Clear / Undo ----
function wpClear() {
    strokes = [];
    curStroke = null;
    lastGifUrl = null;
    setStatus('');
    redraw();
}

function wpUndo() {
    if (strokes.length > 0) { strokes.pop(); lastGifUrl = null; setStatus(''); redraw(); }
}

// ---- Render ----
function drawStroke(pts, color, size) {
    if (!pts || pts.length === 0) return;
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth   = size;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    if (pts.length === 1) {
        ctx.arc(pts[0].x, pts[0].y, size / 2, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        return;
    }
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
}

function redraw(useB) {
    ctx.fillStyle = getBg();
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (const s of strokes) {
        drawStroke(useB ? s.pointsB : s.pointsA, s.color, s.size);
    }
    // Live stroke — always draw clean while user is drawing
    if (curStroke && curStroke.points.length > 0) {
        drawStroke(curStroke.points, curStroke.color, curStroke.size);
    }
}

// ---- Line boil timer: 110ms alternates A/B ----
function startBoilTimer() {
    boilTimer = setInterval(() => {
        if (isRecording) return;
        showB = !showB;
        redraw(showB);
    }, 110);
}

// ---- GIF worker URL (blob trick — avoids CORS on file://) ----
let _gifWorkerUrl = null;
async function getWorkerUrl() {
    if (_gifWorkerUrl) return _gifWorkerUrl;
    try {
        const code = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.text());
        _gifWorkerUrl = URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
    } catch {
        _gifWorkerUrl = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js';
    }
    return _gifWorkerUrl;
}

// ---- GIF encoding (shared by preview button and auto-submit) ----
async function encodeGif(onDone) {
    if (isRecording) return;
    isRecording = true;
    lastGifUrl  = null;
    clearInterval(boilTimer);

    const btn = document.getElementById('btn-gif');
    btn.disabled = true;
    setStatus('Encoding animation...');

    const workerUrl = await getWorkerUrl();
    const DELAY = 110;
    const gif = new GIF({
        workers: 2,
        quality: 6,
        width:   canvas.width,
        height:  canvas.height,
        workerScript: workerUrl
    });

    const pw = document.getElementById('progress-wrap');
    const pb = document.getElementById('progress-bar');
    pw.style.display = 'block';

    const PAIRS = 8;
    for (let i = 0; i < PAIRS; i++) {
        redraw(false); gif.addFrame(canvas, { copy: true, delay: DELAY });
        redraw(true);  gif.addFrame(canvas, { copy: true, delay: DELAY });
        pb.style.width = Math.round((i / PAIRS) * 60) + '%';
        await new Promise(r => setTimeout(r, 4));
    }

    pb.style.width = '70%';
    gif.on('progress', p => { pb.style.width = (70 + Math.round(p * 28)) + '%'; });

    gif.on('finished', blob => {
        pb.style.width = '100%';
        setTimeout(() => { pw.style.display = 'none'; pb.style.width = '0%'; }, 500);

        const reader = new FileReader();
        reader.onload = ev => {
            lastGifUrl = ev.target.result;
            btn.disabled = false;
            isRecording  = false;
            startBoilTimer();
            if (onDone) onDone(lastGifUrl);
        };
        reader.readAsDataURL(blob);
    });

    gif.on('error', () => {
        setStatus('Encoding failed, try again.');
        pw.style.display = 'none';
        btn.disabled = false;
        isRecording  = false;
        startBoilTimer();
    });

    gif.render();
}

// ---- Preview button: encode and show ready status (no download) ----
function previewGif() {
    if (strokes.length === 0) { setStatus('Draw something first!'); return; }
    encodeGif(() => setStatus('Ready! Hit Submit to send ✨'));
}

// ---- Submit: auto-encode if needed, then send ----
function submitToGallery() {
    if (strokes.length === 0) { setStatus('Draw something first!'); return; }
    if (lastGifUrl) {
        doSubmit();
    } else {
        setStatus('Encoding animation for submission...');
        encodeGif(() => doSubmit());
    }
}

function doSubmit() {
    redraw(false);
    window.parent.postMessage({ type: 'wiggly-submit', dataUrl: lastGifUrl }, '*');
    setStatus('Submitted! ✨');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// ---- Listen for parent trigger ----
window.addEventListener('message', e => {
    if (e.data && e.data.type === 'trigger-submit') submitToGallery();
});

// ---- Fullscreen ----
function toggleFullscreen() {
    const btn = document.getElementById('fs-btn');
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
        btn.textContent = '✕';
        btn.title = 'Exit fullscreen';
    } else {
        document.exitFullscreen();
        btn.textContent = '⛶';
        btn.title = 'Fullscreen';
    }
}
document.addEventListener('fullscreenchange', () => {
    const btn = document.getElementById('fs-btn');
    if (!btn) return;
    btn.textContent = document.fullscreenElement ? '✕' : '⛶';
    resizeCanvas();
});

// ---- Init ----
resizeCanvas();
startBoilTimer();
window.addEventListener('resize', resizeCanvas);
bgEl.addEventListener('input', () => redraw(showB));
</script>
</body>
</html>
